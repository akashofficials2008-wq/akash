<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linear & Binary Search Visualizer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#0f172a,#1e3a8a,#7c3aed);
    min-height:100vh;
    color:white;
    font-family:Arial,sans-serif;
}

.container-box{
    max-width:1000px;
    margin:40px auto;
    padding:30px;
    border-radius:25px;
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.1);
    box-shadow:0 0 30px rgba(0,0,0,0.4);
}

h1{
    text-align:center;
    font-weight:bold;
}

.array-container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin-top:25px;
}

.box{
    width:70px;
    height:70px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:15px;
    background:rgba(255,255,255,0.15);
    font-size:22px;
    font-weight:bold;
    transition:0.4s;
}

.active{
    background:#facc15;
    color:black;
    transform:scale(1.15);
    box-shadow:0 0 20px #facc15;
}

.found{
    background:#22c55e;
    color:white;
    transform:scale(1.25);
    box-shadow:
        0 0 10px #22c55e,
        0 0 25px #22c55e,
        0 0 50px #22c55e;
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{transform:scale(1.2);}
    50%{transform:scale(1.35);}
    100%{transform:scale(1.2);}
}

#status{
    text-align:center;
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container-box">

<h1>🔍 Search Algorithm Visualizer</h1>

<div class="mb-3">
    <label>Enter Numbers (comma separated)</label>
    <input type="text" id="arrayInput" class="form-control"
           placeholder="10,5,20,15,30">
</div>

<div class="mb-3">
    <label>Target Value</label>
    <input type="number" id="targetInput" class="form-control"
           placeholder="15">
</div>

<div class="text-center">
    <button class="btn btn-success btn-lg m-2"
            onclick="linearSearch()">
        Linear Search
    </button>

    <button class="btn btn-warning btn-lg m-2"
            onclick="binarySearch()">
        Binary Search
    </button>
</div>

<div id="status"></div>

<div id="arrayDisplay" class="array-container"></div>

</div>

<script>

function sleep(ms){
    return new Promise(resolve => setTimeout(resolve, ms));
}

function getArray(){
    return document.getElementById("arrayInput")
        .value
        .split(",")
        .map(x => parseInt(x.trim()))
        .filter(x => !isNaN(x));
}

function drawArray(arr, active=-1, found=-1){

    let html = "";

    arr.forEach((num,index)=>{

        let cls="box";

        if(index===active)
            cls+=" active";

        if(index===found)
            cls="box found";

        html += `<div class="${cls}">${num}</div>`;
    });

    document.getElementById("arrayDisplay").innerHTML = html;
}

async function linearSearch(){

    let arr = getArray();
    let target = Number(document.getElementById("targetInput").value);

    drawArray(arr);

    for(let i=0;i<arr.length;i++){

        drawArray(arr,i);

        document.getElementById("status").innerHTML =
        `🔍 Checking Index ${i}`;

        await sleep(700);

        if(arr[i]===target){

            drawArray(arr,-1,i);

            document.getElementById("status").innerHTML =
            `🎉 Found ${target} at Index ${i}`;

            return;
        }
    }

    document.getElementById("status").innerHTML =
    "❌ Element Not Found";
}

async function binarySearch(){

    let arr = getArray().sort((a,b)=>a-b);
    let target = Number(document.getElementById("targetInput").value);

    let left=0;
    let right=arr.length-1;

    drawArray(arr);

    while(left<=right){

        let mid=Math.floor((left+right)/2);

        drawArray(arr,mid);

        document.getElementById("status").innerHTML =
        `🚀 Checking Mid Index ${mid}`;

        await sleep(1000);

        if(arr[mid]===target){

            drawArray(arr,-1,mid);

            document.getElementById("status").innerHTML =
            `🎉 Found ${target} at Sorted Index ${mid}`;

            return;
        }

        if(arr[mid] < target)
            left = mid + 1;
        else
            right = mid - 1;
    }

    document.getElementById("status").innerHTML =
    "❌ Element Not Found";
}

</script>

</body>
</html>
